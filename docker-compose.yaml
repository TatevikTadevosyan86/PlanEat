

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: planeat-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planeat-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
