

services:
  backend:
    build: ./backend
    container_name: planeat-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: planeat-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
