# Standard Docker image used by all jobs unless overridden.
# Node.js 24 is needed because the project uses JavaScript/Node.js.
image: node:24

# Defines the order of pipeline stages.
# GitLab will not continue to the next stage if one fails.
stages:
  - test     # Run tests and linting
  - build    # Build frontend production files
  - deploy   # Deploy application to production server

# Default settings shared between jobs.
default:
  cache:
    # Cache key is based on package-lock files.
    # If dependencies change, cache is recreated automatically.
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json

    # Save installed node_modules between pipeline runs.
    # This makes npm installation much faster.
    paths:
      - backend/node_modules/
      - frontend/node_modules/

# Backend testing job.
backend_test:
  stage: test

  script:
    # Move into backend folder.
    - cd backend

    # Install dependencies exactly as defined in package-lock.json.
    # Faster and safer than npm install in CI/CD.
    - npm ci

    # Check JavaScript syntax without running the server.
    # Detects syntax errors early.
    - node --check server.js

    # Run backend automated tests.
    - npm test

# Frontend linting job.
frontend_lint:
  stage: test

  script:
    # Move into frontend folder.
    - cd frontend

    # Install frontend dependencies.
    - npm ci

    # Run ESLint to check code quality and coding standards.
    # Finds unused variables, formatting issues and possible bugs.
    - npm run lint

# Frontend build job.
frontend_build:
  stage: build

  script:
    # Move into frontend folder.
    - cd frontend

    # Install dependencies.
    - npm ci

    # Create optimized production build.
    # Generates static files inside dist/ folder.
    - npm run build

  artifacts:
    # Save generated frontend files for later stages.
    paths:
      - frontend/dist/

    # Automatically delete saved files after 1 week.
    expire_in: 1 week

# Production deployment job.
deploy_production:
  stage: deploy

  # Override default image.
  # Alpine is lightweight and good for SSH/deployment tasks.
  image: alpine:latest

  before_script:
    # Install OpenSSH client inside Alpine container.
    - apk add --no-cache openssh-client

    # Start SSH agent.
    # SSH agent manages private SSH keys securely.
    - eval "$(ssh-agent -s)"

    # Add private SSH key stored in GitLab CI/CD variables.
    # tr -d '\r' removes Windows line endings.
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -

    # Create SSH directory if it does not exist.
    - mkdir -p ~/.ssh

    # Set secure permissions for .ssh folder.
    # 700 = only owner has access.
    - chmod 700 ~/.ssh

    # Add production server fingerprint to known_hosts.
    # Prevents SSH confirmation prompt during deployment.
    - ssh-keyscan -H "$PRODUCTION_HOST" >> ~/.ssh/known_hosts

    # Set correct permissions for known_hosts file.
    # 644 = owner can write, others can read.
    - chmod 644 ~/.ssh/known_hosts

  script:
    - >
      # Connect to production server through SSH.
      ssh "$PRODUCTION_USER@$PRODUCTION_HOST"

      "
      # Move to deployment folder on server.
      cd $DEPLOY_PATH &&

      # Fetch latest changes from GitLab repository.
      git fetch origin &&

      # Ensure correct branch is active.
      git checkout main &&

      # Pull latest version of the project.
      git pull origin main &&

      # Rebuild and restart Docker containers.
      # --build rebuilds images
      # -d runs containers in background
      docker compose -f docker-compose.production.yaml up --build -d
      "

  environment:
    # Define deployment environment name.
    name: production

    # URL to deployed application.
    url: "http://$PRODUCTION_HOST"

  rules:
    # Allow deployment only from main branch.
    - if: '$CI_COMMIT_BRANCH == "main"'

      # Deployment must be started manually in GitLab UI.
      # Prevents accidental production deployments.
      when: manual