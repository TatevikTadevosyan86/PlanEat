image: node:24

stages:
  - test
  - build
  - deploy

default:
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/

backend_test:
  stage: test
  script:
    - cd backend
    - npm ci
    - node --check server.js
    - npm test

frontend_lint:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm run lint

frontend_build:
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week

deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$PRODUCTION_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - >
    - echo "USER=[$PRODUCTION_USER]"
    - echo "HOST=[$PRODUCTION_HOST]"
    - echo "PATH=[$DEPLOY_PATH]"
    - ssh "$PRODUCTION_USER@$PRODUCTION_HOST" "pwd"
      ssh "$PRODUCTION_USER@$PRODUCTION_HOST"
      "cd $DEPLOY_PATH &&
      git fetch origin &&
      git checkout main &&
      git pull origin main &&
      docker compose -f docker-compose.production.yaml up --build -d"
  environment:
    name: production
    url: "http://$PRODUCTION_HOST"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
