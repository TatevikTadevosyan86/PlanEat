  NODE_ENV:test
  JWT_SECRET:ThisIsASecretKeyForJWT
  CLIENT_URL:http://localhost:5173,http://cu2110.camp.lnu.se
  PORT:5000

# Defines the order of pipeline stages.
# GitLab will not continue to the next stage if one fails.
stages:
  - test     # Run tests and linting
  - build    # Build frontend production files
  - deploy   # Deploy application to production server

# Default settings shared between jobs.
default:
  cache:
    # Cache key is based on package-lock files.
    # If dependencies change, cache is recreated automatically.
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json

    # Save installed node_modules between pipeline runs.
    # This makes npm installation much faster.
    paths:
      - backend/node_modules/
      - frontend/node_modules/

# Backend testing job.
backend_test:
  stage: test
  script:
    - cd backend
    - npm ci
    - node --check server.js
    - npm run test:unit
    - npm run test:integration

# Frontend linting job.
frontend_lint:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm run lint
frontend_test:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm run test

# Frontend build job.
frontend_build:
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week

# Production deployment job.
deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$PRODUCTION_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh "$PRODUCTION_USER@$PRODUCTION_HOST" "cd $DEPLOY_PATH && git fetch origin && git checkout main && git pull origin main && docker compose -f docker-compose.production.yaml up --build -d"
  environment:
    name: production
    url: "http://$PRODUCTION_HOST"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual